<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1419" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>CS317 Distributed Systems Quiz – Cairo University</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --correct: #22c55e;
      --wrong: #ef4444;
      --warn: #f59e0b;
      --sticky-header: 0px;
      --sticky-tabs: 0px;
      --touch-min: 44px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }
    * { box-sizing: border-box; }
    html {
      -webkit-text-size-adjust: 100%;
      scroll-padding-top: calc(var(--sticky-header) + var(--sticky-tabs) + 12px);
    }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
      padding-bottom: var(--safe-bottom);
    }
    header {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f1419 100%);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      padding-top: calc(1rem + var(--safe-top));
      padding-left: calc(1.5rem + var(--safe-left));
      padding-right: calc(1.5rem + var(--safe-right));
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { margin: 0 0 0.25rem; font-size: 1.35rem; font-weight: 600; line-height: 1.25; }
    header p { margin: 0; color: var(--muted); font-size: 0.9rem; line-height: 1.4; }
    .tabs-wrap {
      position: sticky;
      top: var(--sticky-header);
      z-index: 99;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }
    .tabs {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
    }
    .tabs::-webkit-scrollbar { height: 4px; }
    .tabs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .tab {
      padding: 0.55rem 1rem;
      min-height: var(--touch-min);
      min-width: 3.25rem;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .tab:hover { border-color: var(--accent); color: var(--text); }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 1.5rem;
      padding-left: calc(1.5rem + var(--safe-left));
      padding-right: calc(1.5rem + var(--safe-right));
    }
    .chapter-panel { display: none; }
    .chapter-panel.active { display: block; }
    .chapter-panel h2 {
      font-size: 1.15rem;
      margin: 0 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .chapter-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .chapter-nav a {
      padding: 0.55rem 0.9rem;
      min-height: var(--touch-min);
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .chapter-nav a:hover {
      background: rgba(59, 130, 246, 0.12);
      border-color: var(--accent);
    }
    .quiz-section {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .quiz-section-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .quiz-section-header h3 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
    }
    .quiz-section-header .meta {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .quiz-section-header .section-score {
      font-size: 0.85rem;
      color: var(--text);
      padding: 0.35rem 0.75rem;
      background: var(--bg);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .quiz-section-header .section-score strong {
      color: var(--accent);
    }
    .quiz-section.mcq-section .quiz-section-header {
      border-left: 4px solid var(--accent);
    }
    .quiz-section.tf-section .quiz-section-header {
      border-left: 4px solid #8b5cf6;
    }
    .quiz-section-body {
      padding: 1rem 1.15rem 1.25rem;
    }
    .section-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0 1.15rem 1rem;
      border-top: 1px solid var(--border);
      margin-top: -0.5rem;
      padding-top: 1rem;
    }
    .btn-section {
      padding: 0.6rem 1rem;
      min-height: var(--touch-min);
      font-size: 0.85rem;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      flex: 1 1 auto;
    }
    .btn-section:hover {
      color: var(--text);
      border-color: var(--muted);
    }
    .question {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.15rem;
      margin-bottom: 0.85rem;
    }
    .question.answered-correct { border-color: var(--correct); }
    .question.answered-wrong { border-color: var(--wrong); }
    .question.unanswered { border-color: var(--warn); }
    .q-num {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .q-text {
      font-weight: 500;
      margin-bottom: 0.75rem;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }
    .options label {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      padding: 0.65rem 0.7rem;
      min-height: var(--touch-min);
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 0.35rem;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(59, 130, 246, 0.15);
    }
    .options label:hover { background: rgba(59, 130, 246, 0.08); }
    .options label:active { background: rgba(59, 130, 246, 0.14); }
    .options input {
      margin-top: 0.15rem;
      flex-shrink: 0;
      width: 1.15rem;
      height: 1.15rem;
      cursor: pointer;
    }
    .options label span { flex: 1; min-width: 0; }
    .options label.correct-opt {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid var(--correct);
    }
    .options label.wrong-opt {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid var(--wrong);
    }
    .feedback {
      margin-top: 0.75rem;
      padding: 0.65rem 0.85rem;
      border-radius: 6px;
      font-size: 0.9rem;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.ok { background: rgba(34, 197, 94, 0.12); color: #86efac; }
    .feedback.bad { background: rgba(239, 68, 68, 0.12); color: #fca5a5; }
    .q-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.85rem;
      align-items: center;
    }
    .btn-submit {
      padding: 0.6rem 1.15rem;
      min-height: var(--touch-min);
      font-size: 0.9rem;
      background: var(--accent);
      color: #fff;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-submit:hover { background: var(--accent-hover); }
    .btn-submit:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .question.graded .btn-submit { background: var(--border); color: var(--muted); }
    .question.graded.answered-correct .btn-submit { border: 1px solid var(--correct); color: var(--correct); background: transparent; }
    .question.graded.answered-wrong .btn-submit { border: 1px solid var(--wrong); color: #fca5a5; background: transparent; }
    .score-box.sticky-score { display: block; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin: 1.5rem 0 2rem;
      align-items: center;
    }
    button {
      padding: 0.65rem 1.25rem;
      min-height: var(--touch-min);
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 500;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--muted); }
    .score-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    .score-box.show { display: block; }
    .score-box h3 { margin: 0 0 0.5rem; font-size: 1.1rem; }
    .score-pct { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.75rem;
    }
    .progress-fill {
      height: 100%;
      background: var(--correct);
      transition: width 0.3s;
    }
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* —— Memorization animations —— */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-8px); }
      30% { transform: translateX(8px); }
      45% { transform: translateX(-6px); }
      60% { transform: translateX(6px); }
      75% { transform: translateX(-3px); }
    }
    @keyframes success-pop {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
      40% { transform: scale(1.02); box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }
    @keyframes pulse-correct {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); transform: scale(1); }
      50% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); transform: scale(1.02); }
    }
    @keyframes flash-remember {
      0%, 100% { background: rgba(34, 197, 94, 0.15); }
      25% { background: rgba(34, 197, 94, 0.45); }
      50% { background: rgba(34, 197, 94, 0.2); }
      75% { background: rgba(34, 197, 94, 0.5); }
    }
    @keyframes flip-in {
      from { opacity: 0; transform: perspective(400px) rotateX(-12deg) translateY(-8px); }
      to { opacity: 1; transform: perspective(400px) rotateX(0) translateY(0); }
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spotlight {
      0%, 100% { outline-color: rgba(139, 92, 246, 0); }
      50% { outline-color: rgba(139, 92, 246, 0.8); }
    }
    @keyframes score-bump {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .question.anim-shake { animation: shake 0.55s ease-in-out; }
    .question.anim-success { animation: success-pop 0.65s ease-out; }
    .question.reveal-in { animation: slide-up 0.45s ease-out both; }
    .question.review-spotlight {
      outline: 3px solid rgba(245, 158, 11, 0.9);
      outline-offset: 2px;
      animation: spotlight 1.2s ease-in-out 3;
    }
    .options label.correct-opt.memorize-pulse {
      animation: flash-remember 0.7s ease-in-out 3;
      border-color: var(--correct) !important;
    }
    .feedback.show { animation: flip-in 0.4s ease-out; }
    .memory-reveal {
      margin-top: 0.75rem;
      padding: 0.85rem 1rem;
      border-radius: 8px;
      border: 2px dashed var(--correct);
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.12), rgba(34, 197, 94, 0.04));
      animation: flip-in 0.5s ease-out, pulse-correct 1.5s ease-in-out 0.5s 2;
    }
    .memory-reveal .memory-label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--correct);
      font-weight: 700;
      margin-bottom: 0.35rem;
    }
    .memory-reveal .memory-answer {
      font-size: 1.05rem;
      font-weight: 600;
      color: #bbf7d0;
      line-height: 1.4;
    }
    .score-pct.bump { animation: score-bump 0.4s ease-out; }

    .mem-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.25rem;
      margin-top: 0.85rem;
      padding-top: 0.85rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    .mem-toolbar label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
    }
    .mem-toolbar label:has(input:checked) { color: var(--text); }
    .mem-toolbar input { accent-color: var(--accent); }
    .btn-mem {
      padding: 0.55rem 0.9rem;
      min-height: var(--touch-min);
      font-size: 0.8rem;
      background: rgba(139, 92, 246, 0.2);
      color: #c4b5fd;
      border: 1px solid #8b5cf6;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-mem:hover { background: rgba(139, 92, 246, 0.35); }
    .streak-badge {
      font-size: 0.8rem;
      padding: 0.35rem 0.65rem;
      background: rgba(245, 158, 11, 0.15);
      border: 1px solid var(--warn);
      border-radius: 20px;
      color: #fcd34d;
    }
    .streak-badge.hot { animation: pulse-correct 1s ease-in-out infinite; }

    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 9999;
      animation: confetti-fall 1.1s ease-out forwards;
    }
    @keyframes confetti-fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .question.anim-shake,
      .question.anim-success,
      .question.reveal-in,
      .question.review-spotlight,
      .options label.correct-opt.memorize-pulse,
      .feedback.show,
      .memory-reveal,
      .score-pct.bump { animation: none !important; }
      .confetti-piece { display: none; }
    }

  /* —— Tablet —— */
    @media (max-width: 768px) {
      header { padding: 0.85rem 1rem; padding-top: calc(0.85rem + var(--safe-top)); }
      header h1 { font-size: 1.15rem; }
      header p { font-size: 0.82rem; }
      main { padding: 1rem; }
      .quiz-section-header { flex-direction: column; align-items: flex-start; }
      .quiz-section-header .section-score { width: 100%; text-align: center; }
      .score-pct { font-size: 1.65rem; }
      .chapter-nav a { flex: 1 1 calc(50% - 0.25rem); text-align: center; min-height: var(--touch-min); display: flex; align-items: center; justify-content: center; }
      .actions .btn-primary,
      .actions .btn-secondary { flex: 1 1 100%; width: 100%; }
      .section-actions { flex-direction: column; }
      .section-actions .btn-section { width: 100%; text-align: center; }
    }

    /* —— Phone —— */
    @media (max-width: 480px) {
      :root { --touch-min: 48px; }
      header { padding: 0.75rem 0.85rem; padding-top: calc(0.75rem + var(--safe-top)); }
      header h1 { font-size: 1.05rem; }
      header p { display: none; }
      .mem-toolbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem 0.65rem;
        margin-top: 0.65rem;
        padding-top: 0.65rem;
      }
      .mem-toolbar label { font-size: 0.78rem; min-height: 2.25rem; align-items: center; }
      .mem-toolbar .btn-mem { grid-column: 1 / -1; width: 100%; }
      .mem-toolbar .streak-badge { grid-column: 1 / -1; justify-self: center; }
      .tabs { padding: 0.6rem 0.75rem; gap: 0.4rem; }
      .tab { padding: 0.5rem 0.85rem; font-size: 0.8rem; min-width: 2.75rem; }
      main { padding: 0.75rem; }
      .chapter-panel h2 { font-size: 1rem; }
      .quiz-section { border-radius: 10px; margin-bottom: 1.25rem; }
      .quiz-section-header { padding: 0.85rem 1rem; }
      .quiz-section-header h3 { font-size: 0.95rem; }
      .quiz-section-header .meta { font-size: 0.78rem; }
      .quiz-section-body { padding: 0.75rem 0.85rem 1rem; }
      .question { padding: 0.85rem; margin-bottom: 0.65rem; border-radius: 8px; }
      .q-text { font-size: 0.95rem; }
      .options label { padding: 0.75rem 0.65rem; font-size: 0.92rem; }
      .options input { width: 1.25rem; height: 1.25rem; }
      .btn-submit { width: 100%; justify-content: center; }
      .q-actions { flex-direction: column; }
      .q-actions .btn-submit { width: 100%; }
      .feedback { font-size: 0.85rem; }
      .memory-reveal .memory-answer { font-size: 0.95rem; }
      .score-box { padding: 0.85rem 1rem; }
      .score-box h3 { font-size: 1rem; }
      .chapter-nav { flex-direction: column; }
      .chapter-nav a { flex: 1 1 auto; width: 100%; }
      footer { padding: 1.25rem 1rem; font-size: 0.75rem; }
      .question.anim-shake { animation-duration: 0.4s; }
    }

    @media (max-width: 360px) {
      .mem-toolbar { grid-template-columns: 1fr; }
      .mem-toolbar label { grid-column: 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>CS317 Distributed Systems Quiz</h1>
    <p>Cairo University – Faculty of Science – Dr. Hatem Moharram (Chapters 1–5)</p>
    <div class="mem-toolbar">
      <label title="Shake wrong answers, flash the correct one, show Remember card">
        <input type="checkbox" id="mem-mode" checked /> Memorize animations
      </label>
      <label title="Scroll to the next unanswered question after you submit">
        <input type="checkbox" id="mem-auto" checked /> Auto next question
      </label>
      <label title="Brief celebration when you get one right">
        <input type="checkbox" id="mem-confetti" checked /> Success effects
      </label>
      <button type="button" class="btn-mem" id="review-wrong" title="Jump to questions you got wrong">
        Review my mistakes
      </button>
      <span class="streak-badge" id="streak-badge" title="Consecutive correct answers">Streak: 0</span>
    </div>
  </header>
  <div class="tabs-wrap">
    <nav class="tabs" id="tabs" aria-label="Chapters"></nav>
  </div>
  <main>
    <div id="panels"></div>
  </main>
  <script src="questions.js"></script>
  <script>
    const panelsEl = document.getElementById("panels");
    const tabsEl = document.getElementById("tabs");
    let activeChapter = 1;
    let streak = 0;
    let revealObserver = null;

    const memMode = () => document.getElementById("mem-mode")?.checked !== false;
    const memAuto = () => document.getElementById("mem-auto")?.checked !== false;
    const memConfetti = () => document.getElementById("mem-confetti")?.checked !== false;

    function prefersReducedMotion() {
      return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    }

    function clearMemAnimations(qEl) {
      qEl.classList.remove("anim-shake", "anim-success", "review-spotlight");
      qEl.querySelectorAll(".memorize-pulse").forEach((l) => l.classList.remove("memorize-pulse"));
      const mem = qEl.querySelector(".memory-reveal");
      if (mem) mem.remove();
    }

    function spawnConfetti(anchor) {
      if (!memConfetti() || prefersReducedMotion()) return;
      const rect = anchor.getBoundingClientRect();
      const colors = ["#22c55e", "#3b82f6", "#f59e0b", "#8b5cf6", "#ec4899"];
      for (let i = 0; i < 14; i++) {
        const p = document.createElement("div");
        p.className = "confetti-piece";
        p.style.left = rect.left + rect.width / 2 + (Math.random() - 0.5) * 80 + "px";
        p.style.top = rect.top + 20 + "px";
        p.style.background = colors[i % colors.length];
        p.style.animationDuration = 0.8 + Math.random() * 0.6 + "s";
        p.style.animationDelay = Math.random() * 0.15 + "s";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1600);
      }
    }

    function updateStreak(isCorrect) {
      const badge = document.getElementById("streak-badge");
      if (!badge) return;
      if (isCorrect) {
        streak++;
        badge.textContent = "Streak: " + streak + (streak >= 3 ? " 🔥" : "");
        badge.classList.toggle("hot", streak >= 5);
      } else {
        streak = 0;
        badge.textContent = "Streak: 0";
        badge.classList.remove("hot");
      }
    }

    function playMemorizeFeedback(qEl, isCorrect, memoryText) {
      if (!memMode() || prefersReducedMotion()) return;

      qEl.classList.remove("anim-shake", "anim-success");
      void qEl.offsetWidth;

      if (isCorrect) {
        qEl.classList.add("anim-success");
        if (memConfetti()) spawnConfetti(qEl);
      } else {
        qEl.classList.add("anim-shake");
        const correctLabel = qEl.querySelector(".options label.correct-opt");
        if (correctLabel) {
          correctLabel.classList.add("memorize-pulse");
          setTimeout(() => correctLabel.classList.remove("memorize-pulse"), 2200);
        }
        if (memoryText) {
          const existing = qEl.querySelector(".memory-reveal");
          if (existing) existing.remove();
          const card = document.createElement("div");
          card.className = "memory-reveal";
          card.innerHTML =
            '<span class="memory-label">Remember for next time</span>' +
            '<span class="memory-answer"></span>';
          card.querySelector(".memory-answer").textContent = memoryText;
          const fb = qEl.querySelector(".feedback");
          if (fb) fb.after(card);
          else qEl.appendChild(card);
        }
      }
    }

    function scrollToNextUnanswered(qEl) {
      if (!memAuto() || prefersReducedMotion()) return;
      const section = qEl.closest(".quiz-section-body");
      if (!section) return;
      const questions = [...section.querySelectorAll(".question")];
      const idx = questions.indexOf(qEl);
      const next = questions.slice(idx + 1).find((q) => !q.classList.contains("graded"));
      const wasWrong = qEl.classList.contains("answered-wrong");
      if (next) {
        setTimeout(() => {
          next.scrollIntoView({ behavior: "smooth", block: "center" });
          next.classList.add("review-spotlight");
          setTimeout(() => next.classList.remove("review-spotlight"), 2400);
        }, wasWrong ? 1200 : 450);
      }
    }

    function initScrollReveal() {
      if (prefersReducedMotion()) return;
      if (revealObserver) revealObserver.disconnect();
      revealObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) return;
            const el = entry.target;
            if (el.classList.contains("reveal-in")) return;
            const siblings = [...el.parentElement.querySelectorAll(".question")];
            const i = siblings.indexOf(el);
            el.style.animationDelay = Math.min(i * 0.04, 0.4) + "s";
            el.classList.add("reveal-in");
            revealObserver.unobserve(el);
          });
        },
        { threshold: 0.08, rootMargin: "0px 0px -40px 0px" }
      );
      document.querySelectorAll(".question").forEach((q) => revealObserver.observe(q));
    }

    function reviewMistakes() {
      const panel = document.querySelector(".chapter-panel.active");
      if (!panel) return;
      const wrong = [...panel.querySelectorAll(".question.answered-wrong")];
      if (!wrong.length) {
        alert("No wrong answers in this chapter yet — great job!");
        return;
      }
      wrong.forEach((q) => q.classList.remove("review-spotlight"));
      const target = wrong.find((q) => !q.dataset.reviewed) || wrong[0];
      wrong.forEach((q) => delete q.dataset.reviewed);
      target.dataset.reviewed = "1";
      target.scrollIntoView({ behavior: "smooth", block: "center" });
      target.classList.add("review-spotlight");
      const correctLabel = target.querySelector(".options label.correct-opt span");
      if (correctLabel && memMode()) {
        let text = correctLabel.textContent.replace(/^[A-Z]\.\s*/, "").trim();
        if (target.dataset.type === "tf") {
          text = target.dataset.answer === "true" ? "True" : "False";
          if (target.dataset.fix) text += " — " + target.dataset.fix;
        }
        if (!target.querySelector(".memory-reveal")) {
          playMemorizeFeedback(target, false, text);
        }
      }
      setTimeout(() => target.classList.remove("review-spotlight"), 3500);
    }

    function letters(n) {
      return "ABCDEFGHIJKLMNOPQRSTUVWXYZ".slice(0, n);
    }

    function renderMcq(ch, chIdx, list, prefix) {
      return list.map((item, i) => {
        const id = `ch${ch.id}-${prefix}-${i}`;
        const opts = item.opts
          .map(
            (t, j) =>
              `<label data-opt="${j}">
                <input type="radio" name="${id}" value="${j}" />
                <span><strong>${letters(item.opts.length)[j]}.</strong> ${escapeHtml(t)}</span>
              </label>`
          )
          .join("");
        return `
          <div class="question" id="wrap-${id}" data-type="mcq" data-answer="${item.a}">
            <div class="q-num">${prefix.toUpperCase()} ${i + 1}</div>
            <div class="q-text">${escapeHtml(item.q)}</div>
            <div class="options">${opts}</div>
            <div class="q-actions">
              <button type="button" class="btn-submit" data-qid="${id}">Submit</button>
            </div>
            <div class="feedback" id="fb-${id}"></div>
          </div>`;
      }).join("");
    }

    function renderTf(ch, list) {
      return list.map((item, i) => {
        const id = `ch${ch.id}-tf-${i}`;
        const opts = [
          { v: "true", t: "True" },
          { v: "false", t: "False" }
        ]
          .map(
            (o) =>
              `<label data-opt="${o.v}">
                <input type="radio" name="${id}" value="${o.v}" />
                <span><strong>${o.t}</strong></span>
              </label>`
          )
          .join("");
        const fix = item.fix ? escapeHtml(item.fix) : "";
        return `
          <div class="question" id="wrap-${id}" data-type="tf" data-answer="${item.a}" data-fix="${fix}">
            <div class="q-num">T/F ${i + 1}</div>
            <div class="q-text">${escapeHtml(item.q)}</div>
            <div class="options">${opts}</div>
            <div class="q-actions">
              <button type="button" class="btn-submit" data-qid="${id}">Submit</button>
            </div>
            <div class="feedback" id="fb-${id}"></div>
          </div>`;
      }).join("");
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function buildUI() {
      QUIZ_DATA.chapters.forEach((ch, idx) => {
        const tab = document.createElement("button");
        tab.className = "tab" + (idx === 0 ? " active" : "");
        tab.textContent = `Ch ${ch.id}`;
        tab.title = ch.title;
        tab.dataset.ch = ch.id;
        tab.addEventListener("click", () => switchChapter(ch.id));
        tabsEl.appendChild(tab);

        const panel = document.createElement("div");
        panel.className = "chapter-panel" + (idx === 0 ? " active" : "");
        panel.id = `panel-${ch.id}`;
        const mcqCount = ch.mcq.length;
        const tfCount = ch.tf.length;
        const total = mcqCount + tfCount;
        panel.innerHTML = `
          <h2>${escapeHtml(ch.title)}</h2>
          <div class="score-box sticky-score" id="score-${ch.id}">
            <h3>Chapter score (all sections)</h3>
            <div class="score-pct" id="score-pct-${ch.id}">—</div>
            <p id="score-detail-${ch.id}" style="margin:0.5rem 0 0;color:var(--muted)">Submit each question with its button. Score updates as you go.</p>
            <div class="progress-bar" title="Correct ÷ submitted"><div class="progress-fill" id="score-bar-${ch.id}" style="width:0%"></div></div>
            <p id="score-progress-${ch.id}" style="margin:0.5rem 0 0;font-size:0.85rem;color:var(--muted)">0 / ${total} submitted</p>
          </div>
          <nav class="chapter-nav" aria-label="Jump to section">
            <a href="#ch${ch.id}-mcq">Multiple choice (Q1)</a>
            <a href="#ch${ch.id}-tf">True / False (Q2)</a>
          </nav>

          <section class="quiz-section mcq-section" id="ch${ch.id}-mcq" data-section="mcq">
            <div class="quiz-section-header">
              <div>
                <h3>Multiple choice — Q(1)</h3>
                <p class="meta">${mcqCount} questions · check one answer per question</p>
              </div>
              <span class="section-score" id="score-mcq-${ch.id}"><strong>—</strong> · 0 / ${mcqCount} submitted</span>
            </div>
            <div class="quiz-section-body" id="mcq-${ch.id}">${renderMcq(ch, idx, ch.mcq, "mcq")}</div>
            <div class="section-actions">
              <button type="button" class="btn-section" data-submit-section="${ch.id}" data-section-type="mcq">Submit all answered (MCQ)</button>
              <button type="button" class="btn-section" data-reset-section="${ch.id}" data-section-type="mcq">Reset MCQ</button>
            </div>
          </section>

          <section class="quiz-section tf-section" id="ch${ch.id}-tf" data-section="tf">
            <div class="quiz-section-header">
              <div>
                <h3>True / False — Q(2)</h3>
                <p class="meta">${tfCount} statements · mark True or False</p>
              </div>
              <span class="section-score" id="score-tf-${ch.id}"><strong>—</strong> · 0 / ${tfCount} submitted</span>
            </div>
            <div class="quiz-section-body" id="tf-${ch.id}">${renderTf(ch, ch.tf)}</div>
            <div class="section-actions">
              <button type="button" class="btn-section" data-submit-section="${ch.id}" data-section-type="tf">Submit all answered (T/F)</button>
              <button type="button" class="btn-section" data-reset-section="${ch.id}" data-section-type="tf">Reset T/F</button>
            </div>
          </section>

          <div class="actions">
            <button type="button" class="btn-primary" data-submit-all="${ch.id}">Submit all answered (entire chapter)</button>
            <button type="button" class="btn-secondary" data-reset="${ch.id}">Reset entire chapter</button>
          </div>`;
        panelsEl.appendChild(panel);
      });

      document.querySelectorAll(".btn-submit").forEach((btn) => {
        btn.addEventListener("click", () => {
          const wrap = document.getElementById("wrap-" + btn.dataset.qid);
          if (wrap) gradeQuestion(wrap);
        });
      });

      document.querySelectorAll("[data-submit-all]").forEach((btn) => {
        btn.addEventListener("click", () => gradeChapter(+btn.dataset.submitAll, false));
      });
      document.querySelectorAll("[data-submit-section]").forEach((btn) => {
        btn.addEventListener("click", () =>
          gradeSection(+btn.dataset.submitSection, btn.dataset.sectionType)
        );
      });
      document.querySelectorAll("[data-reset-section]").forEach((btn) => {
        btn.addEventListener("click", () =>
          resetSection(+btn.dataset.resetSection, btn.dataset.sectionType)
        );
      });
      document.querySelectorAll("[data-reset]").forEach((btn) => {
        btn.addEventListener("click", () => resetChapter(+btn.dataset.reset));
      });

      document.querySelectorAll(".chapter-nav a").forEach((link) => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          const target = document.querySelector(link.getAttribute("href"));
          if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });

      document.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        const active = document.activeElement;
        if (!active || active.type !== "radio") return;
        const wrap = active.closest(".question");
        if (wrap) {
          e.preventDefault();
          gradeQuestion(wrap);
        }
      });

      document.getElementById("review-wrong")?.addEventListener("click", reviewMistakes);
      initScrollReveal();
      updateStickyOffsets();
    }

    function switchChapter(id) {
      activeChapter = id;
      document.querySelectorAll(".tab").forEach((t) => {
        t.classList.toggle("active", +t.dataset.ch === id);
      });
      document.querySelectorAll(".chapter-panel").forEach((p) => {
        p.classList.toggle("active", p.id === `panel-${id}`);
      });
      initScrollReveal();
    }

    function gradeQuestion(qEl) {
      const type = qEl.dataset.type;
      const answer = qEl.dataset.answer;
      const fb = qEl.querySelector(".feedback");
      const selected = qEl.querySelector('input[type="radio"]:checked');
      const labels = qEl.querySelectorAll(".options label");
      const submitBtn = qEl.querySelector(".btn-submit");

      labels.forEach((l) => l.classList.remove("correct-opt", "wrong-opt", "memorize-pulse"));
      qEl.classList.remove("answered-correct", "answered-wrong", "unanswered");
      clearMemAnimations(qEl);
      fb.classList.remove("show", "ok", "bad");
      fb.textContent = "";

      if (!selected) {
        qEl.classList.add("unanswered");
        fb.classList.add("show", "bad");
        fb.textContent = "Pick an answer, then submit.";
        return null;
      }

      let isCorrect = false;
      let correctLabel = null;

      if (type === "mcq") {
        const correctIdx = +answer;
        isCorrect = +selected.value === correctIdx;
        labels.forEach((l) => {
          if (+l.dataset.opt === correctIdx) {
            l.classList.add("correct-opt");
            correctLabel = l.querySelector("span").textContent;
          }
          if (+l.dataset.opt === +selected.value && !isCorrect) l.classList.add("wrong-opt");
        });
      } else {
        isCorrect = selected.value === answer;
        labels.forEach((l) => {
          if (l.dataset.opt === answer) l.classList.add("correct-opt");
          if (l.dataset.opt === selected.value && !isCorrect) l.classList.add("wrong-opt");
        });
      }

      qEl.classList.add("graded");
      qEl.dataset.gradedCorrect = isCorrect ? "1" : "0";

      let memoryText = "";
      if (isCorrect) {
        qEl.classList.add("answered-correct");
        fb.classList.add("show", "ok");
        fb.textContent = "Correct — well done!";
        if (submitBtn) submitBtn.textContent = "Submitted ✓";
      } else {
        qEl.classList.add("answered-wrong");
        fb.classList.add("show", "bad");
        let msg = "Incorrect.";
        if (type === "mcq" && correctLabel) {
          memoryText = correctLabel.replace(/^[A-Z]\.\s*/, "").trim();
          msg += " See the highlighted answer below.";
        } else if (type === "tf") {
          memoryText = answer === "true" ? "True" : "False";
          const fix = qEl.dataset.fix;
          if (fix) memoryText += " — " + fix;
          msg += " Correct: " + memoryText;
        }
        fb.textContent = msg;
        if (submitBtn) submitBtn.textContent = "Submitted ✗";
      }

      playMemorizeFeedback(qEl, isCorrect, isCorrect ? null : memoryText);
      updateStreak(isCorrect);

      const chId = +qEl.closest(".chapter-panel").id.replace("panel-", "");
      updateChapterScore(chId);
      bumpScoreDisplay(chId);
      scrollToNextUnanswered(qEl);
      return isCorrect;
    }

    function scoreQuestions(questions) {
      const list = Array.from(questions);
      const total = list.length;
      let graded = 0;
      let correct = 0;
      list.forEach((q) => {
        if (!q.classList.contains("graded")) return;
        graded++;
        if (q.dataset.gradedCorrect === "1") correct++;
      });
      const pctCorrect = graded ? Math.round((correct / graded) * 100) : null;
      return { total, graded, correct, pctCorrect };
    }

    function formatSectionScore(elId, stats) {
      const el = document.getElementById(elId);
      if (!el) return;
      const pct = stats.pctCorrect !== null ? stats.pctCorrect + "%" : "—";
      el.innerHTML = `<strong>${pct}</strong> · ${stats.graded} / ${stats.total} submitted`;
    }

    function updateChapterScore(chId) {
      const panel = document.getElementById(`panel-${chId}`);
      const mcqSection = panel.querySelector(".mcq-section");
      const tfSection = panel.querySelector(".tf-section");
      const mcqStats = scoreQuestions(mcqSection.querySelectorAll(".question"));
      const tfStats = scoreQuestions(tfSection.querySelectorAll(".question"));
      const total = mcqStats.total + tfStats.total;
      const graded = mcqStats.graded + tfStats.graded;
      const correct = mcqStats.correct + tfStats.correct;

      formatSectionScore(`score-mcq-${chId}`, mcqStats);
      formatSectionScore(`score-tf-${chId}`, tfStats);

      const pctSubmitted = total ? Math.round((graded / total) * 100) : 0;
      const pctCorrect = graded ? Math.round((correct / graded) * 100) : 0;

      document.getElementById(`score-pct-${chId}`).textContent =
        graded ? pctCorrect + "%" : "—";
      document.getElementById(`score-detail-${chId}`).textContent = graded
        ? `${correct} correct · MCQ ${mcqStats.correct}/${mcqStats.graded} · T/F ${tfStats.correct}/${tfStats.graded}`
        : "Submit each question with its button. Score updates as you go.";
      document.getElementById(`score-bar-${chId}`).style.width =
        graded ? pctCorrect + "%" : "0%";
      document.getElementById(`score-progress-${chId}`).textContent =
        `${graded} / ${total} submitted (${pctSubmitted}% of chapter)`;
    }

    function bumpScoreDisplay(chId) {
      const el = document.getElementById(`score-pct-${chId}`);
      if (!el || prefersReducedMotion()) return;
      el.classList.remove("bump");
      void el.offsetWidth;
      el.classList.add("bump");
    }

    function gradeSection(chId, sectionType) {
      const panel = document.getElementById(`panel-${chId}`);
      const section = panel.querySelector(`.${sectionType}-section`);
      if (!section) return;
      let submitted = 0;
      section.querySelectorAll(".question").forEach((qEl) => {
        if (!qEl.querySelector('input[type="radio"]:checked')) return;
        gradeQuestion(qEl);
        submitted++;
      });
      updateChapterScore(chId);
      if (!submitted) {
        alert("Select at least one answer in this section first.");
      }
    }

    function resetSection(chId, sectionType) {
      const panel = document.getElementById(`panel-${chId}`);
      const section = panel.querySelector(`.${sectionType}-section`);
      if (!section) return;
      section.querySelectorAll('input[type="radio"]').forEach((i) => (i.checked = false));
      section.querySelectorAll(".question").forEach((q) => {
        q.classList.remove("answered-correct", "answered-wrong", "unanswered", "graded");
        delete q.dataset.gradedCorrect;
        delete q.dataset.reviewed;
        clearMemAnimations(q);
        q.querySelectorAll(".options label").forEach((l) =>
          l.classList.remove("correct-opt", "wrong-opt", "memorize-pulse")
        );
        const fb = q.querySelector(".feedback");
        if (fb) {
          fb.classList.remove("show", "ok", "bad");
          fb.textContent = "";
        }
        const submitBtn = q.querySelector(".btn-submit");
        if (submitBtn) submitBtn.textContent = "Submit";
      });
      updateChapterScore(chId);
    }

    function gradeChapter(chId, scrollToScore) {
      const panel = document.getElementById(`panel-${chId}`);
      const questions = panel.querySelectorAll(".question");
      let submitted = 0;

      questions.forEach((qEl) => {
        const selected = qEl.querySelector('input[type="radio"]:checked');
        if (!selected) return;
        gradeQuestion(qEl);
        submitted++;
      });

      updateChapterScore(chId);
      if (scrollToScore !== false) {
        document.getElementById(`score-${chId}`).scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
      if (!submitted) {
        alert("Select at least one answer before using Submit all answered.");
      }
    }

    function resetChapter(chId) {
      const panel = document.getElementById(`panel-${chId}`);
      panel.querySelectorAll('input[type="radio"]').forEach((i) => (i.checked = false));
      streak = 0;
      updateStreak(false);
      panel.querySelectorAll(".question").forEach((q) => {
        q.classList.remove("answered-correct", "answered-wrong", "unanswered", "graded");
        delete q.dataset.gradedCorrect;
        delete q.dataset.reviewed;
        clearMemAnimations(q);
        q.querySelectorAll(".options label").forEach((l) =>
          l.classList.remove("correct-opt", "wrong-opt", "memorize-pulse")
        );
        const fb = q.querySelector(".feedback");
        if (fb) {
          fb.classList.remove("show", "ok", "bad");
          fb.textContent = "";
        }
        const submitBtn = q.querySelector(".btn-submit");
        if (submitBtn) submitBtn.textContent = "Submit";
      });
      updateChapterScore(chId);
    }

    function updateStickyOffsets() {
      const header = document.querySelector("header");
      const tabsWrap = document.querySelector(".tabs-wrap");
      if (header) {
        document.documentElement.style.setProperty(
          "--sticky-header",
          header.getBoundingClientRect().height + "px"
        );
      }
      if (tabsWrap) {
        document.documentElement.style.setProperty(
          "--sticky-tabs",
          tabsWrap.getBoundingClientRect().height + "px"
        );
      }
    }

    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(updateStickyOffsets, 100);
    });
    window.addEventListener("orientationchange", () => {
      setTimeout(updateStickyOffsets, 150);
    });

    buildUI();
    QUIZ_DATA.chapters.forEach((ch) => updateChapterScore(ch.id));
    requestAnimationFrame(() => {
      updateStickyOffsets();
      setTimeout(updateStickyOffsets, 100);
    });
  </script>
</body>
</html>
